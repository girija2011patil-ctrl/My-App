<!DOCTYPE html>
<html>

<head>

<title>Smart Waste Management Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

nav{
background:#1b5e20;
padding:10px;
display:flex;
gap:10px;
justify-content:center;
}

nav button{
padding:10px 20px;
border:none;
background:white;
cursor:pointer;
font-weight:bold;
}

section{
display:none;
padding:20px;
}

.active{
display:block;
}

#map{
height:500px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:left;
}

/* statistics cards */

#stats{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
padding:20px;
color:white;
width:180px;
}

.total{background:#4CAF50}
.pending{background:#f44336}
.cleaned{background:#2196F3}
.high{background:#ff9800}

</style>

</head>

<body>

<header>
Smart Waste Reporting System
</header>

<nav>

<button onclick="showSection('mapSection')">Garbage Map</button>

<button onclick="showSection('reportsSection')">Municipal Reports</button>

<a href="../reports/upload.html">
<button>Citizen Upload</button>
</a>

<a href="../cleanup/cleanup.html">
<button>Cleanup Upload</button>
</a>

</nav>


<!-- MAP SECTION -->

<section id="mapSection" class="active">

<h2>Garbage Detection Map</h2>

<div id="map"></div>

</section>


<!-- REPORTS SECTION -->

<section id="reportsSection">

<h2>All Garbage Reports</h2>

<div id="stats">

<div class="card total">
<h3>Total Reports</h3>
<p id="totalReports">0</p>
</div>

<div class="card pending">
<h3>Pending Cleanups</h3>
<p id="pendingReports">0</p>
</div>

<div class="card cleaned">
<h3>Cleaned Locations</h3>
<p id="cleanedReports">0</p>
</div>

<div class="card high">
<h3>High Risk Dumps</h3>
<p id="highRisk">0</p>
</div>

</div>


<table>

<thead>
<tr>
<th>Reporter</th>
<th>Location</th>
<th>Description</th>
<th>Risk</th>
<th>Before</th>
<th>Status</th>
<th>After Cleanup</th>
</tr>
</thead>

<tbody id="reportTable"></tbody>

</table>

</section>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ---------- NAVIGATION ---------- */

function showSection(id){

document.querySelectorAll("section").forEach(sec=>{
sec.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}


/* ---------- MAP ---------- */

var map = L.map('map').setView([20.5937,78.9629],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


/* ---------- LOAD REPORTS ---------- */

async function loadReports(){

const response = await fetch("http://localhost:5000/reports");

const reports = await response.json();

const table = document.getElementById("reportTable");

table.innerHTML="";

/* stats */

let total = reports.length;
let pending = 0;
let cleaned = 0;
let high = 0;


reports.forEach(r=>{

if(r.status==="Pending") pending++;

if(r.status==="Cleaned") cleaned++;

if(r.riskLevel==="High") high++;


/* ---------- MAP MARKERS ---------- */

if(r.latitude && r.longitude){

let color="green";

if(r.riskLevel==="High") color="red";

if(r.riskLevel==="Medium") color="orange";

const marker = L.circleMarker(

[r.latitude,r.longitude],

{
radius:8,
color:color,
fillColor:color,
fillOpacity:0.8
}

).addTo(map);

marker.bindPopup(

"<b>Reported By:</b> "+(r.userId?.name || "Unknown")+
"<br><b>Location:</b> "+r.location+
"<br><b>Description:</b> "+r.description+
"<br><b>Risk:</b> "+r.riskLevel

);

}


/* ---------- TABLE ---------- */

table.innerHTML += `

<tr>

<td>${r.userId?.name || "Unknown"}</td>

<td>${r.location}</td>

<td>${r.description}</td>

<td>${r.riskLevel}</td>

<td>
<img src="http://localhost:5000/uploads/${r.image}" width="80">
</td>

<td>${r.status}</td>

<td>
${r.afterImage ? `<img src="http://localhost:5000/uploads/${r.afterImage}" width="80">` : "Not Cleaned"}
</td>

</tr>

`;

});


/* update statistics */

document.getElementById("totalReports").innerText = total;

document.getElementById("pendingReports").innerText = pending;

document.getElementById("cleanedReports").innerText = cleaned;

document.getElementById("highRisk").innerText = high;

}

loadReports();

</script>

</body>
</html>
